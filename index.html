<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sleep/Wake Quest Prototype</title>
<style>
  :root{
    --bg:#080d25;
    --panel:#121a3d;
    --panel2:#1b2551;
    --line:#42508b;
    --text:#f5f0ff;
    --muted:#aab3d9;
    --yellow:#ffd85a;
    --blue:#7cb7ff;
    --pink:#ff6d8a;
    --green:#66e6b5;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(circle at 50% 15%, #1e2a62 0, #0d1538 42%, #050817 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    color:var(--text);
    overflow:hidden;
  }
  #game{
    width:100vw;
    height:100vh;
    position:relative;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,216,90,.12), transparent 11%),
      radial-gradient(circle at 80% 70%, rgba(124,183,255,.13), transparent 13%),
      linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%);
  }
  .stars{
    position:absolute; inset:0;
    background-image:
      radial-gradient(#fff 1px, transparent 1px),
      radial-gradient(#aab3ff 1px, transparent 1px);
    background-size: 80px 80px, 130px 130px;
    background-position: 10px 20px, 40px 50px;
    opacity:.28;
    pointer-events:none;
  }
  .city{
    position:absolute; left:0; right:0; bottom:0; height:24vh;
    background:
      linear-gradient(to top, #060817 0 68%, transparent 68%),
      repeating-linear-gradient(90deg, transparent 0 18px, rgba(255,216,90,.35) 19px 21px, transparent 22px 40px);
    opacity:.55;
    clip-path: polygon(0 100%,0 45%,4% 45%,4% 30%,8% 30%,8% 55%,14% 55%,14% 38%,22% 38%,22% 65%,29% 65%,29% 28%,36% 28%,36% 52%,43% 52%,43% 34%,52% 34%,52% 60%,60% 60%,60% 42%,68% 42%,68% 25%,76% 25%,76% 55%,83% 55%,83% 36%,91% 36%,91% 50%,100% 50%,100% 100%);
  }
  .hud{
    position:absolute; inset:16px 16px auto 16px;
    display:flex; justify-content:space-between; gap:12px; z-index:20;
    pointer-events:none;
  }
  .hud-left,.hud-right{
    display:flex; gap:10px; align-items:center;
  }
  .pill{
    background:rgba(10,15,40,.72);
    border:1px solid rgba(150,165,255,.35);
    box-shadow: 0 8px 30px rgba(0,0,0,.28), inset 0 0 24px rgba(255,255,255,.04);
    border-radius:18px;
    padding:10px 14px;
    font-weight:800;
    backdrop-filter: blur(8px);
  }
  .small{font-size:13px;color:var(--muted);font-weight:700}
  .resource{display:flex;gap:7px;align-items:center;font-size:20px}
  .questCounter{min-width:190px;text-align:center}
  #world{
    position:absolute;
    inset:0;
    overflow:hidden;
  }
  .groundMark{
    position:absolute;
    width:620px;height:620px;
    border:1px dashed rgba(160,175,255,.25);
    border-radius:50%;
    left:50%;top:51%;
    transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .groundMark::before,.groundMark::after{
    content:"";
    position:absolute; inset:110px;
    border:1px dashed rgba(160,175,255,.18);
    border-radius:50%;
  }
  .groundMark::after{inset:220px}
  .player{
    position:absolute;
    width:74px;height:86px;
    transform:translate(-50%,-50%);
    z-index:8;
    transition: filter .12s;
  }
  .player .body{
    position:absolute;left:14px;top:25px;width:46px;height:56px;
    background:linear-gradient(#515da1,#26316b);
    border:3px solid #060817;border-radius:18px 18px 20px 20px;
    box-shadow:0 12px 18px rgba(0,0,0,.3);
  }
  .player .face{
    position:absolute;left:18px;top:16px;width:38px;height:34px;
    background:#ffd7bc;border:3px solid #060817;border-radius:50%;
  }
  .player .hat{
    position:absolute;left:10px;top:3px;width:55px;height:28px;
    background:#5965aa;border:3px solid #060817;border-radius:30px 30px 10px 10px;
    transform:rotate(-8deg);
  }
  .player .hat::after{
    content:"";position:absolute;right:-12px;top:5px;width:16px;height:16px;
    background:#d6dcff;border:3px solid #060817;border-radius:50%;
  }
  .player .eye{position:absolute;top:14px;width:4px;height:6px;background:#111;border-radius:50%}
  .player .eye.l{left:10px}.player .eye.r{right:10px}
  .player .aura{
    position:absolute;left:50%;top:72%;width:100px;height:40px;
    transform:translate(-50%,-50%);
    background:radial-gradient(ellipse, rgba(255,216,90,.26), transparent 70%);
    border-radius:50%;z-index:-1;
  }

  .quest{
    position:absolute;
    width:92px;height:92px;
    transform:translate(-50%,-50%);
    z-index:6;
    cursor:pointer;
    animation:float 2.2s ease-in-out infinite;
  }
  @keyframes float{0%,100%{margin-top:0}50%{margin-top:-10px}}
  .quest .monster{
    position:absolute; inset:10px;
    border:3px solid rgba(5,8,23,.95);
    box-shadow:0 0 28px currentColor, inset 0 0 20px rgba(255,255,255,.25);
  }
  .quest.wake{color:var(--yellow)}
  .quest.sleep{color:var(--blue)}
  .wake .monster{
    background:linear-gradient(#ffe88d,#ffc642);
    border-radius:45% 48% 38% 40%;
    filter:drop-shadow(0 0 14px rgba(255,216,90,.6));
  }
  .sleep .monster{
    background:linear-gradient(#94ccff,#526cff);
    border-radius:50% 44% 54% 46%;
    filter:drop-shadow(0 0 14px rgba(124,183,255,.6));
  }
  .monster::before,.monster::after{
    content:"";position:absolute;top:30px;width:7px;height:7px;background:#1a1940;border-radius:50%;
  }
  .monster::before{left:23px}.monster::after{right:23px}
  .mouth{
    position:absolute; left:50%; top:48px; width:18px;height:8px;
    border-bottom:3px solid #1a1940; border-radius:50%;
    transform:translateX(-50%);
  }
  .quest .tag{
    position:absolute; left:50%; bottom:-18px; transform:translateX(-50%);
    min-width:116px;text-align:center;
    background:rgba(8,13,37,.82);border:1px solid rgba(255,255,255,.18);
    padding:5px 8px;border-radius:999px;font-size:13px;font-weight:900;
  }
  .quest .alert{
    position:absolute;right:0;top:0;width:26px;height:26px;border-radius:50%;
    display:grid;place-items:center;background:var(--pink);font-weight:1000;
    border:2px solid white;color:white;
  }
  .quest.targeted .monster{outline:4px solid white; outline-offset:5px}
  .quest.done{opacity:.25; filter:grayscale(1); pointer-events:none}

  .bottom{
    position:absolute;left:18px;right:18px;bottom:16px;z-index:30;
    display:grid;grid-template-columns: 1fr auto 1fr;gap:14px;align-items:end;
    pointer-events:none;
  }
  .panel{
    background:rgba(10,15,40,.78);
    border:1px solid rgba(150,165,255,.32);
    border-radius:22px;
    box-shadow:0 14px 40px rgba(0,0,0,.32), inset 0 0 28px rgba(255,255,255,.04);
    padding:14px;
    backdrop-filter: blur(10px);
  }
  .questInfo{
    min-height:126px;
    display:flex;flex-direction:column;gap:8px;
  }
  .questTitle{font-size:24px;font-weight:1000;letter-spacing:-.02em}
  .questTitle.wake{color:var(--yellow)} .questTitle.sleep{color:var(--blue)}
  .bar{
    height:14px;border-radius:999px;background:#0a0f28;border:1px solid rgba(255,255,255,.18);overflow:hidden;
  }
  .fill{height:100%;width:70%;border-radius:999px;background:linear-gradient(90deg,var(--yellow),#fff0a1)}
  .fill.sleep{background:linear-gradient(90deg,var(--blue),#c2dcff)}
  .controls{
    display:flex;gap:12px;justify-content:center;align-items:center;
    pointer-events:auto;
  }
  button{
    border:0;
    color:white;
    font-weight:1000;
    cursor:pointer;
    user-select:none;
    font-family:inherit;
  }
  .skill{
    width:112px;height:112px;border-radius:28px;
    background:rgba(20,28,70,.94);
    border:2px solid rgba(255,255,255,.2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    box-shadow:0 12px 28px rgba(0,0,0,.38), inset 0 0 24px rgba(255,255,255,.06);
    transition:transform .08s, box-shadow .08s, opacity .1s;
  }
  .skill:hover{transform:translateY(-3px)}
  .skill:active{transform:translateY(2px) scale(.98)}
  .skill .icon{font-size:44px;line-height:1}
  .skill.wake{border-color:rgba(255,216,90,.7); color:var(--yellow)}
  .skill.sleep{border-color:rgba(124,183,255,.7); color:var(--blue)}
  .skill.disabled{opacity:.35; filter:grayscale(.8)}
  .stick{
    width:126px;height:126px;border-radius:50%;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    gap:6px;padding:12px;
    background:rgba(10,15,40,.66);
    border:1px solid rgba(150,165,255,.32);
    pointer-events:auto;
  }
  .stick button{
    border-radius:14px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.13);
  }
  .stick button:hover{background:rgba(255,255,255,.18)}
  .stick .blank{visibility:hidden}
  .log{
    min-height:126px;
    font-size:15px;
    color:var(--muted);
    display:flex;flex-direction:column;gap:7px;
  }
  .log strong{color:white}
  .toast{
    position:absolute;left:50%;top:18%;transform:translate(-50%,-50%) scale(.9);
    background:rgba(7,10,25,.88);
    border:1px solid rgba(255,255,255,.24);
    padding:18px 26px;border-radius:24px;
    box-shadow:0 18px 50px rgba(0,0,0,.45);
    font-size:34px;font-weight:1000;
    opacity:0; z-index:50; pointer-events:none;
    transition:.22s;
  }
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .flash{
    position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:45;
  }
  .flash.on{animation:flash .28s ease-out}
  @keyframes flash{0%{opacity:.85}100%{opacity:0}}
  .beam{
    position:absolute; height:8px; border-radius:999px; transform-origin:left center;
    pointer-events:none; z-index:40; opacity:0;
    filter:drop-shadow(0 0 16px currentColor);
  }
  .beam.wake{background:linear-gradient(90deg, transparent, var(--yellow), white); color:var(--yellow)}
  .beam.sleep{background:linear-gradient(90deg, transparent, var(--blue), white); color:var(--blue)}
  .beam.on{animation:beam .35s ease-out}
  @keyframes beam{0%{opacity:1;filter:blur(0) drop-shadow(0 0 16px currentColor)}100%{opacity:0;filter:blur(8px) drop-shadow(0 0 30px currentColor)}}
  .help{
    position:absolute; left:50%; top:74px; transform:translateX(-50%);
    color:rgba(255,255,255,.78); font-weight:800; font-size:14px; z-index:20;
    background:rgba(10,15,40,.55);border:1px solid rgba(255,255,255,.12);
    border-radius:999px;padding:8px 14px;
  }
  @media(max-width:900px){
    .bottom{grid-template-columns:1fr;align-items:stretch}
    .stick{position:absolute;left:0;bottom:0;width:106px;height:106px}
    .controls{justify-content:flex-end}
    .skill{width:86px;height:86px;border-radius:22px}.skill .icon{font-size:34px}
    .questInfo,.log{display:none}
  }
</style>
</head>
<body>
<div id="game">
  <div class="stars"></div>
  <div class="city"></div>
  <div class="groundMark"></div>
  <div class="flash" id="flash"></div>
  <div class="beam" id="beam"></div>
  <div class="toast" id="toast">QUEST CLEAR!</div>

  <div class="hud">
    <div class="hud-left">
      <div class="pill resource">⚡ <span id="boltCount">5</span></div>
      <div class="pill resource">🛏️ <span id="pillowCount">4</span></div>
      <div class="pill resource">👍 <span id="thumbCount">0</span></div>
    </div>
    <div class="pill questCounter">
      <div>반경 10km 내 긴급 퀘스트</div>
      <div class="small"><span id="remainCount">5</span>건 남음 · 방향키/WASD 이동</div>
    </div>
    <div class="hud-right">
      <div class="pill">LV.7 근성이</div>
    </div>
  </div>

  <div class="help">가까이 가서 알맞은 스킬을 누르세요 · 노랑=번개 · 파랑=베개</div>

  <div id="world"></div>

  <div class="bottom">
    <div class="panel questInfo">
      <div class="small">현재 타깃</div>
      <div id="targetTitle" class="questTitle">가까운 퀘스트 없음</div>
      <div id="targetDesc" class="small">노란 졸음구름은 번개, 파란 생각벌레는 베개로 해제</div>
      <div class="bar"><div id="targetBar" class="fill" style="width:0%"></div></div>
    </div>

    <div class="controls">
      <div class="stick">
        <span class="blank"></span><button data-move="up">▲</button><span class="blank"></span>
        <button data-move="left">◀</button><span class="blank"></span><button data-move="right">▶</button>
        <span class="blank"></span><button data-move="down">▼</button><span class="blank"></span>
      </div>
      <button class="skill wake" id="wakeSkill">
        <div class="icon">⚡</div>
        <div>번개</div>
      </button>
      <button class="skill sleep" id="sleepSkill">
        <div class="icon">🛏️</div>
        <div>베개</div>
      </button>
    </div>

    <div class="panel log">
      <div><strong>플레이 로그</strong></div>
      <div id="log1">퀘스트에 접근하면 타깃이 자동 선택됩니다.</div>
      <div id="log2">잘못된 스킬을 쓰면 자원이 낭비됩니다.</div>
      <div id="log3">5건을 모두 해결하면 오늘의 도움 완료.</div>
    </div>
  </div>
</div>

<script>
const world = document.getElementById('world');
const game = document.getElementById('game');
const flash = document.getElementById('flash');
const beam = document.getElementById('beam');
const toast = document.getElementById('toast');
const targetTitle = document.getElementById('targetTitle');
const targetDesc = document.getElementById('targetDesc');
const targetBar = document.getElementById('targetBar');

let W = innerWidth, H = innerHeight;
const player = {x: W/2, y: H/2+30, speed: 7};
let keys = {};
let resources = {bolt:5, pillow:4, thumbs:0};
let selected = null;
let completed = 0;

const quests = [
  {id:1,type:'wake',name:'졸음구름',level:3,x:.28,y:.32,power:72,dist:'2.4km'},
  {id:2,type:'sleep',name:'생각벌레 떼',level:2,x:.70,y:.34,power:65,dist:'6.8km'},
  {id:3,type:'wake',name:'꾸벅안개',level:1,x:.78,y:.58,power:48,dist:'3.2km'},
  {id:4,type:'sleep',name:'각성방울',level:2,x:.25,y:.62,power:58,dist:'7.6km'},
  {id:5,type:'wake',name:'Z 덩어리',level:4,x:.55,y:.24,power:84,dist:'1.1km'}
];

const pEl = document.createElement('div');
pEl.className = 'player';
pEl.innerHTML = '<div class="aura"></div><div class="hat"></div><div class="body"></div><div class="face"><i class="eye l"></i><i class="eye r"></i></div>';
world.appendChild(pEl);

for(const q of quests){
  const el = document.createElement('div');
  el.className = `quest ${q.type}`;
  el.dataset.id = q.id;
  el.innerHTML = `<div class="alert">!</div><div class="monster"><div class="mouth"></div></div><div class="tag">${q.name} Lv.${q.level} · ${q.dist}</div>`;
  q.el = el;
  world.appendChild(el);
  el.addEventListener('click',()=>selectQuest(q));
}

function layout(){
  W = innerWidth; H = innerHeight;
  pEl.style.left = player.x+'px';
  pEl.style.top = player.y+'px';
  quests.forEach(q=>{
    q.px = q.x*W; q.py = q.y*H;
    q.el.style.left = q.px+'px';
    q.el.style.top = q.py+'px';
  });
}
layout();
addEventListener('resize',layout);

function updateHUD(){
  document.getElementById('boltCount').textContent = resources.bolt;
  document.getElementById('pillowCount').textContent = resources.pillow;
  document.getElementById('thumbCount').textContent = resources.thumbs;
  document.getElementById('remainCount').textContent = quests.length - completed;
  document.getElementById('wakeSkill').classList.toggle('disabled', resources.bolt <= 0);
  document.getElementById('sleepSkill').classList.toggle('disabled', resources.pillow <= 0);
}
function log(a,b,c){
  document.getElementById('log1').textContent = a;
  if(b) document.getElementById('log2').textContent = b;
  if(c) document.getElementById('log3').textContent = c;
}
function distance(q){
  return Math.hypot(player.x-q.px, player.y-q.py);
}
function autoTarget(){
  let nearest = null;
  for(const q of quests){
    if(q.done) continue;
    const d = distance(q);
    if(d < 180 && (!nearest || d < distance(nearest))) nearest = q;
  }
  if(nearest !== selected) selectQuest(nearest, true);
  if(!nearest && selected) selectQuest(null, true);
}
function selectQuest(q, silent=false){
  if(selected) selected.el.classList.remove('targeted');
  selected = q;
  if(q){
    q.el.classList.add('targeted');
    const isWake = q.type === 'wake';
    targetTitle.textContent = `${isWake?'WAKE':'SLEEP'} QUEST · ${q.name} Lv.${q.level}`;
    targetTitle.className = 'questTitle ' + q.type;
    targetDesc.textContent = isWake
      ? '상태: 졸림 · 의지: 깨어있고 싶음 · 필요 스킬: 번개'
      : '상태: 각성 · 의지: 잠들고 싶음 · 필요 스킬: 베개';
    targetBar.style.width = q.power+'%';
    targetBar.className = 'fill ' + (isWake?'':'sleep');
    if(!silent) log(`${q.name} 타깃 지정.`, `거리 ${Math.round(distance(q))}px · ${isWake?'번개':'베개'} 사용 가능`, '스킬 버튼을 누르면 퀘스트가 진행됩니다.');
  }else{
    targetTitle.textContent = '가까운 퀘스트 없음';
    targetTitle.className = 'questTitle';
    targetDesc.textContent = '퀘스트 근처로 이동하세요.';
    targetBar.style.width = '0%';
  }
}
function useSkill(type){
  if(!selected){
    shakePlayer();
    log('타깃이 없습니다.', '퀘스트 근처로 이동한 뒤 스킬을 사용하세요.', '노랑=번개 · 파랑=베개');
    return;
  }
  if(type === 'wake' && resources.bolt <= 0) return;
  if(type === 'sleep' && resources.pillow <= 0) return;

  if(type === 'wake') resources.bolt--;
  if(type === 'sleep') resources.pillow--;

  if(type !== selected.type){
    shakePlayer();
    showToast('MISS!', type);
    log('스킬 불일치!', '노란 몬스터는 번개, 파란 몬스터는 베개가 필요합니다.', '자원 1개가 소모되었습니다.');
    updateHUD();
    return;
  }

  fireBeam(type, selected);
  selected.done = true;
  selected.el.classList.add('done');
  selected.el.classList.remove('targeted');
  completed++;
  resources.thumbs++;
  if(type === 'wake') flashScreen();
  showToast('QUEST CLEAR!', type);
  log(`${selected.name} 해제 완료!`, `따봉 +1 · 오늘의 도움 ${resources.thumbs}명`, completed === quests.length ? '모든 긴급 퀘스트 완료!' : '다음 퀘스트를 찾으세요.');
  selected = null;
  updateHUD();
}

function fireBeam(type, q){
  const dx = q.px - player.x, dy = q.py - player.y;
  const len = Math.hypot(dx,dy);
  const angle = Math.atan2(dy,dx) * 180/Math.PI;
  beam.className = 'beam ' + type;
  beam.style.left = player.x+'px';
  beam.style.top = player.y+'px';
  beam.style.width = len+'px';
  beam.style.transform = `rotate(${angle}deg)`;
  beam.classList.remove('on'); void beam.offsetWidth; beam.classList.add('on');
}
function flashScreen(){
  flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
}
function showToast(text,type){
  toast.textContent = text;
  toast.style.color = type === 'sleep' ? 'var(--blue)' : 'var(--yellow)';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),850);
}
function shakePlayer(){
  pEl.style.filter = 'drop-shadow(0 0 18px #ff6d8a)';
  pEl.animate([
    {transform:'translate(-50%,-50%) translateX(0)'},
    {transform:'translate(-50%,-50%) translateX(-8px)'},
    {transform:'translate(-50%,-50%) translateX(8px)'},
    {transform:'translate(-50%,-50%) translateX(0)'}
  ],{duration:240});
  setTimeout(()=>pEl.style.filter='',250);
}

addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key === '1') useSkill('wake');
  if(e.key === '2') useSkill('sleep');
  if(e.key === ' ') {
    if(selected) useSkill(selected.type);
  }
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()] = false);

document.getElementById('wakeSkill').addEventListener('click',()=>useSkill('wake'));
document.getElementById('sleepSkill').addEventListener('click',()=>useSkill('sleep'));
document.querySelectorAll('[data-move]').forEach(btn=>{
  let interval;
  const start=()=>{
    keys['touch_'+btn.dataset.move]=true;
    interval=setInterval(()=>{},16);
  };
  const stop=()=>{
    keys['touch_'+btn.dataset.move]=false;
    clearInterval(interval);
  };
  btn.addEventListener('pointerdown',start);
  btn.addEventListener('pointerup',stop);
  btn.addEventListener('pointerleave',stop);
  btn.addEventListener('pointercancel',stop);
});

function loop(){
  let vx=0, vy=0;
  if(keys['arrowup']||keys['w']||keys['touch_up']) vy-=1;
  if(keys['arrowdown']||keys['s']||keys['touch_down']) vy+=1;
  if(keys['arrowleft']||keys['a']||keys['touch_left']) vx-=1;
  if(keys['arrowright']||keys['d']||keys['touch_right']) vx+=1;
  if(vx||vy){
    const l=Math.hypot(vx,vy);
    player.x += vx/l*player.speed;
    player.y += vy/l*player.speed;
    player.x = Math.max(52,Math.min(W-52,player.x));
    player.y = Math.max(105,Math.min(H-170,player.y));
    pEl.style.left = player.x+'px';
    pEl.style.top = player.y+'px';
  }
  autoTarget();
  requestAnimationFrame(loop);
}
updateHUD();
loop();
</script>
</body>
</html>
