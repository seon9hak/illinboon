<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sleep/Wake Quest Prototype V2</title>
<style>
:root{
  --bg:#060817;
  --panel:#101838;
  --panel2:#172357;
  --text:#f5f0ff;
  --muted:#aab3d9;
  --yellow:#ffd85a;
  --blue:#7cb7ff;
  --pink:#ff6d8a;
  --green:#6cf0bd;
  --red:#ff5959;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--text);
  background:#040615;
}
#game{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:
    radial-gradient(circle at 50% 40%,rgba(64,83,173,.34),transparent 35%),
    radial-gradient(circle at 25% 20%,rgba(255,216,90,.12),transparent 16%),
    radial-gradient(circle at 80% 70%,rgba(124,183,255,.13),transparent 19%),
    linear-gradient(180deg,#0d1538,#050817 70%);
}
.stars{
  position:absolute;inset:0;pointer-events:none;opacity:.25;
  background-image:radial-gradient(#fff 1px,transparent 1px),radial-gradient(#9fb0ff 1px,transparent 1px);
  background-size:70px 70px,118px 118px;
  background-position:10px 20px,35px 55px;
}
.city{
  position:absolute;left:0;right:0;bottom:0;height:23vh;opacity:.5;pointer-events:none;
  background:linear-gradient(to top,#050717 0 70%,transparent 70%);
  clip-path:polygon(0 100%,0 50%,5% 50%,5% 34%,11% 34%,11% 60%,17% 60%,17% 42%,23% 42%,23% 68%,31% 68%,31% 30%,38% 30%,38% 55%,45% 55%,45% 40%,53% 40%,53% 64%,62% 64%,62% 36%,69% 36%,69% 22%,77% 22%,77% 58%,85% 58%,85% 38%,93% 38%,93% 51%,100% 51%,100% 100%);
}
#world{position:absolute;inset:0}
.ring{
  position:absolute;left:50%;top:52%;width:min(70vw,70vh);height:min(70vw,70vh);
  border:1px dashed rgba(160,175,255,.22);border-radius:50%;
  transform:translate(-50%,-50%);pointer-events:none;
}
.ring:before,.ring:after{content:"";position:absolute;border:1px dashed rgba(160,175,255,.16);border-radius:50%}
.ring:before{inset:17%}.ring:after{inset:34%}

.hud{
  position:absolute;left:14px;right:14px;top:14px;z-index:30;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:12px;pointer-events:none;
}
.pill,.panel{
  background:rgba(9,14,37,.78);
  border:1px solid rgba(150,165,255,.30);
  box-shadow:0 12px 35px rgba(0,0,0,.36), inset 0 0 24px rgba(255,255,255,.04);
  backdrop-filter:blur(9px);
}
.pill{border-radius:18px;padding:10px 13px;font-weight:900}
.hud-left,.hud-right{display:flex;gap:8px;align-items:center}
.hud-right{justify-content:flex-end}
.resource{display:flex;align-items:center;gap:7px;font-size:19px}
.centerHud{text-align:center;min-width:270px}
.timerBig{font-size:32px;line-height:1;font-weight:1000}
.small{font-size:13px;color:var(--muted);font-weight:800}
.statusLine{margin-top:4px;color:var(--muted);font-weight:800}

.player{
  position:absolute;width:76px;height:88px;transform:translate(-50%,-50%);z-index:15;
}
.player .aura{
  position:absolute;left:50%;top:75%;width:132px;height:58px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,rgba(255,216,90,.25),transparent 68%);
  z-index:-1;
}
.player .body{
  position:absolute;left:14px;top:28px;width:48px;height:57px;border-radius:20px 20px 22px 22px;
  background:linear-gradient(#5564b0,#253071);border:3px solid #050817;
  box-shadow:0 12px 20px rgba(0,0,0,.38);
}
.player .face{
  position:absolute;left:18px;top:17px;width:40px;height:35px;border-radius:50%;
  background:#ffd7bc;border:3px solid #050817;
}
.player .hat{
  position:absolute;left:8px;top:4px;width:58px;height:30px;border-radius:30px 30px 10px 10px;
  background:#606db8;border:3px solid #050817;transform:rotate(-8deg);
}
.player .hat:after{
  content:"";position:absolute;right:-13px;top:5px;width:17px;height:17px;border-radius:50%;
  background:#dce2ff;border:3px solid #050817;
}
.eye{position:absolute;top:14px;width:4px;height:6px;border-radius:50%;background:#111}
.eye.l{left:10px}.eye.r{right:10px}

.monster{
  position:absolute;width:86px;height:86px;transform:translate(-50%,-50%);
  z-index:12;cursor:pointer;animation:bob 1.6s ease-in-out infinite;
}
@keyframes bob{0%,100%{margin-top:0}50%{margin-top:-8px}}
.monster .body{
  position:absolute;inset:10px;border:3px solid #050817;box-shadow:0 0 28px currentColor,inset 0 0 22px rgba(255,255,255,.26);
}
.monster.wake{color:var(--yellow)}
.monster.sleep{color:var(--blue)}
.monster.wake .body{
  border-radius:45% 50% 38% 42%;
  background:linear-gradient(#ffed91,#ffc33f);
}
.monster.sleep .body{
  border-radius:52% 42% 55% 45%;
  background:linear-gradient(#9bd1ff,#526eff);
}
.monster .body:before,.monster .body:after{
  content:"";position:absolute;top:29px;width:7px;height:7px;border-radius:50%;background:#161939;
}
.monster .body:before{left:23px}.monster .body:after{right:23px}
.monster .mouth{
  position:absolute;left:50%;top:47px;width:18px;height:8px;border-bottom:3px solid #161939;border-radius:50%;
  transform:translateX(-50%);
}
.monster .ttl{
  position:absolute;left:50%;top:-16px;transform:translateX(-50%);
  width:70px;height:7px;border-radius:999px;background:#141a3c;border:1px solid rgba(255,255,255,.25);overflow:hidden;
}
.monster .ttlFill{height:100%;width:100%;background:currentColor;border-radius:999px}
.monster .tag{
  position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);
  white-space:nowrap;background:rgba(8,13,37,.82);border:1px solid rgba(255,255,255,.18);
  padding:4px 8px;border-radius:999px;font-size:12px;font-weight:1000;
}
.monster.locked .body{outline:4px solid white;outline-offset:5px}
.monster.expire{animation:poof .28s ease-in forwards}
@keyframes poof{to{transform:translate(-50%,-50%) scale(1.5);opacity:0;filter:blur(8px)}}

.crosshair{
  position:absolute;width:132px;height:132px;border-radius:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:20;opacity:0;transition:.1s;
  border:2px solid rgba(255,255,255,.55);
  box-shadow:0 0 24px rgba(255,255,255,.18);
}
.crosshair.show{opacity:1}
.crosshair:before,.crosshair:after{content:"";position:absolute;background:rgba(255,255,255,.55)}
.crosshair:before{left:50%;top:-14px;width:2px;height:28px;box-shadow:0 146px 0 rgba(255,255,255,.55)}
.crosshair:after{top:50%;left:-14px;height:2px;width:28px;box-shadow:146px 0 0 rgba(255,255,255,.55)}
.aimBar{
  position:absolute;left:50%;bottom:-34px;width:150px;height:15px;border-radius:999px;
  transform:translateX(-50%);
  background:#080d25;border:1px solid rgba(255,255,255,.24);overflow:hidden;
}
.aimFill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),#d5ffe9)}
.aimZone{
  position:absolute;top:0;height:100%;width:22%;left:39%;background:rgba(255,255,255,.28);
  border-left:2px solid white;border-right:2px solid white;
}

.bottom{
  position:absolute;left:16px;right:16px;bottom:16px;z-index:35;
  display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:end;pointer-events:none;
}
.panel{border-radius:22px;padding:14px}
.mission{min-height:128px}
.title{font-size:24px;font-weight:1000;letter-spacing:-.02em}
.title.wake{color:var(--yellow)}.title.sleep{color:var(--blue)}
.controls{display:flex;gap:12px;align-items:center;justify-content:center;pointer-events:auto}
.stick{
  width:126px;height:126px;border-radius:50%;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:6px;padding:12px;background:rgba(10,15,40,.66);
  border:1px solid rgba(150,165,255,.32);
}
.stick button{
  border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);
  color:white;border-radius:14px;font-weight:1000;
}
.stick button:hover{background:rgba(255,255,255,.18)}
.blank{visibility:hidden}
.skill{
  width:112px;height:112px;border-radius:28px;border:2px solid rgba(255,255,255,.2);
  background:rgba(20,28,70,.94);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;font-weight:1000;box-shadow:0 12px 28px rgba(0,0,0,.38),inset 0 0 24px rgba(255,255,255,.06);
  transition:.08s;
}
.skill:hover{transform:translateY(-3px)}.skill:active{transform:translateY(2px) scale(.98)}
.skill .icon{font-size:44px;line-height:1}
.skill.wake{border-color:rgba(255,216,90,.7);color:var(--yellow)}
.skill.sleep{border-color:rgba(124,183,255,.7);color:var(--blue)}
.skill.disabled{opacity:.35;filter:grayscale(.8)}
.log{min-height:128px;color:var(--muted);display:flex;flex-direction:column;gap:7px}
.log strong{color:white}

.toast{
  position:absolute;left:50%;top:22%;transform:translate(-50%,-50%) scale(.9);
  z-index:80;opacity:0;pointer-events:none;transition:.18s;
  background:rgba(7,10,25,.88);border:1px solid rgba(255,255,255,.25);
  border-radius:26px;padding:18px 28px;font-size:38px;font-weight:1000;
  box-shadow:0 18px 50px rgba(0,0,0,.45);
}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.flash{position:absolute;inset:0;background:white;opacity:0;z-index:70;pointer-events:none}
.flash.on{animation:flash .25s ease-out}
@keyframes flash{0%{opacity:.8}100%{opacity:0}}
.beam{
  position:absolute;height:9px;border-radius:999px;transform-origin:left center;z-index:65;pointer-events:none;opacity:0;
  filter:drop-shadow(0 0 18px currentColor);
}
.beam.wake{background:linear-gradient(90deg,transparent,var(--yellow),white);color:var(--yellow)}
.beam.sleep{background:linear-gradient(90deg,transparent,var(--blue),white);color:var(--blue)}
.beam.on{animation:beam .32s ease-out}
@keyframes beam{0%{opacity:1}100%{opacity:0;filter:blur(8px) drop-shadow(0 0 30px currentColor)}}

.startOverlay,.endOverlay{
  position:absolute;inset:0;z-index:100;background:rgba(4,6,21,.78);backdrop-filter:blur(8px);
  display:grid;place-items:center;
}
.card{
  width:min(620px,92vw);border-radius:30px;padding:28px;
  background:rgba(14,20,52,.92);border:1px solid rgba(160,175,255,.35);
  box-shadow:0 28px 70px rgba(0,0,0,.45);
  text-align:center;
}
.card h1{margin:0 0 10px;font-size:42px}
.card p{color:var(--muted);line-height:1.6;font-weight:700}
.startBtn{
  margin-top:18px;border:0;border-radius:18px;padding:16px 24px;
  font-size:20px;font-weight:1000;background:linear-gradient(90deg,var(--yellow),#fff0a1);color:#171124;
  cursor:pointer;
}
.endOverlay{display:none}
.endOverlay.show{display:grid}

@media(max-width:920px){
  .hud{grid-template-columns:1fr;gap:6px}
  .hud-right{justify-content:flex-start}
  .centerHud{min-width:0}
  .bottom{grid-template-columns:1fr;align-items:stretch}
  .mission,.log{display:none}
  .controls{justify-content:flex-end}
  .stick{position:absolute;left:0;bottom:0;width:106px;height:106px}
  .skill{width:86px;height:86px;border-radius:22px}.skill .icon{font-size:34px}
}
</style>
</head>
<body>
<div id="game">
  <div class="stars"></div>
  <div class="city"></div>
  <div class="ring"></div>
  <div id="world"></div>
  <div id="crosshair" class="crosshair"><div class="aimBar"><div class="aimZone"></div><div id="aimFill" class="aimFill"></div></div></div>
  <div id="beam" class="beam"></div>
  <div id="flash" class="flash"></div>
  <div id="toast" class="toast">CLEAR!</div>

  <div class="hud">
    <div class="hud-left">
      <div class="pill resource">⚡ <span id="boltCount">8</span></div>
      <div class="pill resource">🛏️ <span id="pillowCount">8</span></div>
      <div class="pill resource">👍 <span id="thumbCount">0</span></div>
    </div>
    <div class="pill centerHud">
      <div class="timerBig" id="gameTimer">01:30</div>
      <div class="statusLine">제한시간 안에 불일치를 해제하세요</div>
    </div>
    <div class="hud-right">
      <div class="pill">COMBO <span id="comboCount">0</span></div>
      <div class="pill">MISS <span id="missCount">0</span></div>
    </div>
  </div>

  <div class="bottom">
    <div class="panel mission">
      <div class="small">현재 조준</div>
      <div id="targetTitle" class="title">타깃 없음</div>
      <div id="targetDesc" class="small">몬스터에게 가까이 가면 조준 게이지가 열립니다.</div>
      <div class="small">조준 게이지가 중앙 영역에 들어왔을 때 스킬 사용!</div>
    </div>

    <div class="controls">
      <div class="stick">
        <span class="blank"></span><button data-move="up">▲</button><span class="blank"></span>
        <button data-move="left">◀</button><span class="blank"></span><button data-move="right">▶</button>
        <span class="blank"></span><button data-move="down">▼</button><span class="blank"></span>
      </div>
      <button class="skill wake" id="wakeSkill"><div class="icon">⚡</div><div>번개</div><div class="small">1</div></button>
      <button class="skill sleep" id="sleepSkill"><div class="icon">🛏️</div><div>베개</div><div class="small">2</div></button>
    </div>

    <div class="panel log">
      <div><strong>룰</strong></div>
      <div id="log1">노란 졸음구름 = 번개</div>
      <div id="log2">파란 생각벌레 = 베개</div>
      <div id="log3">중앙 조준 성공 시 콤보 상승</div>
    </div>
  </div>

  <div id="startOverlay" class="startOverlay">
    <div class="card">
      <h1>Sleep/Wake Quest</h1>
      <p>
        몬스터가 돌아다니다가 생기고 사라집니다.<br>
        가까이 접근하면 조준 게이지가 열리고, 중앙 타이밍에 맞춰 스킬을 사용하세요.<br>
        노랑은 번개, 파랑은 베개.
      </p>
      <button id="startBtn" class="startBtn">게임 시작</button>
    </div>
  </div>

  <div id="endOverlay" class="endOverlay">
    <div class="card">
      <h1 id="endTitle">TIME UP</h1>
      <p id="endStats"></p>
      <button id="restartBtn" class="startBtn">다시 하기</button>
    </div>
  </div>
</div>

<script>
const world = document.getElementById('world');
const game = document.getElementById('game');
const crosshair = document.getElementById('crosshair');
const aimFill = document.getElementById('aimFill');
const beam = document.getElementById('beam');
const flash = document.getElementById('flash');
const toast = document.getElementById('toast');

let W = innerWidth, H = innerHeight;
let started = false;
let ended = false;
let timeLeft = 90;
let lastTime = performance.now();
let spawnTimer = 0;
let spawnEvery = 2.2;
let nextId = 1;
let keys = {};
let monsters = [];
let selected = null;
let aim = 0;
let aimDir = 1;

const player = {x: W/2, y:H/2+40, speed:260};
const res = {bolt:8,pillow:8,thumbs:0,combo:0,miss:0,score:0};

const pEl = document.createElement('div');
pEl.className='player';
pEl.innerHTML='<div class="aura"></div><div class="hat"></div><div class="body"></div><div class="face"><i class="eye l"></i><i class="eye r"></i></div>';
world.appendChild(pEl);

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rand(a,b){return a+Math.random()*(b-a)}
function fmt(t){
  t=Math.max(0,Math.ceil(t));
  const m=String(Math.floor(t/60)).padStart(2,'0');
  const s=String(t%60).padStart(2,'0');
  return `${m}:${s}`;
}
function layout(){
  W=innerWidth;H=innerHeight;
  player.x=clamp(player.x,50,W-50);
  player.y=clamp(player.y,105,H-160);
}
addEventListener('resize',layout);

function makeMonster(type=null){
  if(monsters.length>=9) return;
  type = type || (Math.random()<.52?'wake':'sleep');
  const margin=110;
  const m={
    id:nextId++,
    type,
    name:type==='wake'?'졸음구름':'생각벌레',
    x:rand(margin,W-margin),
    y:rand(125,H-190),
    vx:rand(-48,48),
    vy:rand(-36,36),
    ttl:rand(9,15),
    maxTtl:0,
    level:Math.ceil(rand(1,4))
  };
  m.maxTtl=m.ttl;
  const el=document.createElement('div');
  el.className=`monster ${type}`;
  el.innerHTML=`<div class="ttl"><div class="ttlFill"></div></div><div class="body"><div class="mouth"></div></div><div class="tag">${m.name} Lv.${m.level}</div>`;
  m.el=el;
  m.fill=el.querySelector('.ttlFill');
  world.appendChild(el);
  monsters.push(m);
  if(Math.random()<.35) showToast('SPAWN!', type);
}
function updateMonsterEl(m){
  m.el.style.left=m.x+'px';
  m.el.style.top=m.y+'px';
  m.fill.style.width=(m.ttl/m.maxTtl*100)+'%';
}
function removeMonster(m, expired=false){
  if(expired){
    m.el.classList.add('expire');
    setTimeout(()=>m.el.remove(),300);
  }else{
    m.el.remove();
  }
  monsters=monsters.filter(x=>x!==m);
  if(selected===m) selected=null;
}
function nearestMonster(){
  let best=null,bd=99999;
  for(const m of monsters){
    const d=Math.hypot(player.x-m.x, player.y-m.y);
    if(d<bd){bd=d;best=m;}
  }
  return best && bd<165 ? best : null;
}
function select(m){
  if(selected && selected.el) selected.el.classList.remove('locked');
  selected=m;
  if(m){
    m.el.classList.add('locked');
    crosshair.classList.add('show');
    document.getElementById('targetTitle').textContent=(m.type==='wake'?'WAKE':'SLEEP')+` · ${m.name} Lv.${m.level}`;
    document.getElementById('targetTitle').className='title '+m.type;
    document.getElementById('targetDesc').textContent=m.type==='wake'
      ? '졸린데 깨고 싶은 대상에게 붙은 몬스터. 번개로 해제.'
      : '자고 싶은데 각성한 대상에게 붙은 몬스터. 베개로 진정.';
  }else{
    crosshair.classList.remove('show');
    document.getElementById('targetTitle').textContent='타깃 없음';
    document.getElementById('targetTitle').className='title';
    document.getElementById('targetDesc').textContent='몬스터에게 가까이 가면 조준 게이지가 열립니다.';
  }
}
function useSkill(type){
  if(!started || ended) return;
  if(!selected){miss('타깃 없음'); return;}
  if(type==='wake' && res.bolt<=0){miss('번개 없음'); return;}
  if(type==='sleep' && res.pillow<=0){miss('베개 없음'); return;}

  if(type==='wake') res.bolt--;
  if(type==='sleep') res.pillow--;

  if(type!==selected.type){
    miss('스킬 불일치!');
    showToast('WRONG!', 'bad');
    updateHUD();
    return;
  }

  const inZone = aim>=39 && aim<=61;
  if(!inZone){
    miss('타이밍 실패!');
    showToast('MISS!', 'bad');
    updateHUD();
    return;
  }

  fireBeam(type, selected);
  if(type==='wake') flashScreen();
  res.thumbs++;
  res.combo++;
  res.score += 100 + res.combo*20;
  if(res.combo % 3 === 0){
    if(Math.random()<.5) res.bolt++; else res.pillow++;
    showToast(`COMBO x${res.combo}!`, type);
  }else{
    showToast('CLEAR!', type);
  }
  document.getElementById('log1').textContent=`${selected.name} 해제 성공!`;
  document.getElementById('log2').textContent=`콤보 x${res.combo} · 점수 ${res.score}`;
  document.getElementById('log3').textContent=`남은 몬스터 ${monsters.length-1}체`;
  removeMonster(selected);
  select(null);
  updateHUD();
}
function miss(msg){
  res.combo=0;
  res.miss++;
  document.getElementById('log1').textContent=msg;
  document.getElementById('log2').textContent='콤보가 끊겼습니다.';
  document.getElementById('log3').textContent='다시 중앙 조준을 맞춰보세요.';
  pEl.animate([
    {transform:'translate(-50%,-50%) translateX(0)'},
    {transform:'translate(-50%,-50%) translateX(-8px)'},
    {transform:'translate(-50%,-50%) translateX(8px)'},
    {transform:'translate(-50%,-50%) translateX(0)'}
  ],{duration:230});
}
function fireBeam(type,m){
  const dx=m.x-player.x, dy=m.y-player.y, len=Math.hypot(dx,dy);
  const angle=Math.atan2(dy,dx)*180/Math.PI;
  beam.className='beam '+type;
  beam.style.left=player.x+'px';
  beam.style.top=player.y+'px';
  beam.style.width=len+'px';
  beam.style.transform=`rotate(${angle}deg)`;
  beam.classList.remove('on'); void beam.offsetWidth; beam.classList.add('on');
}
function flashScreen(){
  flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
}
function showToast(text,type){
  toast.textContent=text;
  if(type==='sleep') toast.style.color='var(--blue)';
  else if(type==='bad') toast.style.color='var(--red)';
  else toast.style.color='var(--yellow)';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),600);
}
function updateHUD(){
  document.getElementById('boltCount').textContent=res.bolt;
  document.getElementById('pillowCount').textContent=res.pillow;
  document.getElementById('thumbCount').textContent=res.thumbs;
  document.getElementById('comboCount').textContent=res.combo;
  document.getElementById('missCount').textContent=res.miss;
  document.getElementById('gameTimer').textContent=fmt(timeLeft);
  document.getElementById('wakeSkill').classList.toggle('disabled',res.bolt<=0);
  document.getElementById('sleepSkill').classList.toggle('disabled',res.pillow<=0);
}
function endGame(){
  ended=true;
  document.getElementById('endTitle').textContent='TIME UP';
  document.getElementById('endStats').innerHTML=
    `도운 사람 <b>${res.thumbs}명</b><br>점수 <b>${res.score}</b><br>실패 <b>${res.miss}</b><br>최종 콤보 <b>x${res.combo}</b>`;
  document.getElementById('endOverlay').classList.add('show');
}
function resetGame(){
  monsters.forEach(m=>m.el.remove());
  monsters=[];
  selected=null;
  timeLeft=90;
  spawnTimer=0;
  nextId=1;
  Object.assign(res,{bolt:8,pillow:8,thumbs:0,combo:0,miss:0,score:0});
  player.x=W/2; player.y=H/2+40;
  ended=false; started=true;
  document.getElementById('endOverlay').classList.remove('show');
  select(null);
  for(let i=0;i<5;i++) makeMonster(i%2?'sleep':'wake');
  updateHUD();
}

function tick(now){
  const dt=Math.min(.035,(now-lastTime)/1000);
  lastTime=now;
  if(started && !ended){
    timeLeft-=dt;
    if(timeLeft<=0) endGame();

    let vx=0,vy=0;
    if(keys['arrowup']||keys['w']||keys['touch_up']) vy-=1;
    if(keys['arrowdown']||keys['s']||keys['touch_down']) vy+=1;
    if(keys['arrowleft']||keys['a']||keys['touch_left']) vx-=1;
    if(keys['arrowright']||keys['d']||keys['touch_right']) vx+=1;
    if(vx||vy){
      const l=Math.hypot(vx,vy);
      player.x+=vx/l*player.speed*dt;
      player.y+=vy/l*player.speed*dt;
    }
    player.x=clamp(player.x,48,W-48);
    player.y=clamp(player.y,110,H-165);
    pEl.style.left=player.x+'px';
    pEl.style.top=player.y+'px';

    spawnTimer+=dt;
    if(spawnTimer>spawnEvery){
      spawnTimer=0;
      makeMonster();
      spawnEvery=rand(1.6,3.1);
    }

    for(const m of [...monsters]){
      m.ttl-=dt;
      if(m.ttl<=0){
        res.combo=0;
        res.miss++;
        document.getElementById('log1').textContent=`${m.name} 사라짐`;
        document.getElementById('log2').textContent='불일치 해결 실패 · 콤보 초기화';
        document.getElementById('log3').textContent='스폰이 계속됩니다.';
        removeMonster(m,true);
        continue;
      }
      m.x+=m.vx*dt; m.y+=m.vy*dt;
      if(m.x<60 || m.x>W-60) m.vx*=-1;
      if(m.y<130 || m.y>H-185) m.vy*=-1;
      m.x=clamp(m.x,60,W-60); m.y=clamp(m.y,130,H-185);
      if(Math.random()<.01){m.vx+=rand(-30,30);m.vy+=rand(-24,24)}
      m.vx=clamp(m.vx,-75,75);m.vy=clamp(m.vy,-60,60);
      updateMonsterEl(m);
    }

    const n=nearestMonster();
    if(n!==selected) select(n);
    if(selected){
      crosshair.style.left=selected.x+'px';
      crosshair.style.top=selected.y+'px';
      aim+=aimDir*dt*95;
      if(aim>=100){aim=100;aimDir=-1}
      if(aim<=0){aim=0;aimDir=1}
      aimFill.style.width=aim+'%';
    }

    updateHUD();
  }
  requestAnimationFrame(tick);
}

addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key==='1') useSkill('wake');
  if(e.key==='2') useSkill('sleep');
  if(e.key===' ') selected && useSkill(selected.type);
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

document.getElementById('wakeSkill').addEventListener('click',()=>useSkill('wake'));
document.getElementById('sleepSkill').addEventListener('click',()=>useSkill('sleep'));
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startOverlay').style.display='none';
  resetGame();
});
document.getElementById('restartBtn').addEventListener('click',resetGame);

document.querySelectorAll('[data-move]').forEach(btn=>{
  const k='touch_'+btn.dataset.move;
  const start=()=>keys[k]=true;
  const stop=()=>keys[k]=false;
  btn.addEventListener('pointerdown',start);
  btn.addEventListener('pointerup',stop);
  btn.addEventListener('pointerleave',stop);
  btn.addEventListener('pointercancel',stop);
});

layout();
pEl.style.left=player.x+'px';pEl.style.top=player.y+'px';
updateHUD();
requestAnimationFrame(tick);
</script>
</body>
</html>
